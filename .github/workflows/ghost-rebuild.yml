name: Rebuild on Ghost Update

on:
  repository_dispatch:
    types: [ghost_content_update]

concurrency:
  group: ghost-rebuild
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://getmasterok.ru
          GHOST_API_URL: ${{ secrets.GHOST_API_URL }}
          GHOST_CONTENT_API_KEY: ${{ secrets.GHOST_CONTENT_API_KEY }}

  # Timeweb Cloud auto-deploys from main branch.
  # This workflow rebuilds the site when content changes in Ghost.
