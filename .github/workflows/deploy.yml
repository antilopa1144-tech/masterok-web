name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Timeweb
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.NEXT_PUBLIC_OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://getmasterok.ru
          NEXT_PUBLIC_SITE_NAME: "Мастерок — строительные калькуляторы"
          NEXT_PUBLIC_YM_COUNTER: ${{ vars.NEXT_PUBLIC_YM_COUNTER }}

      - name: Verify build output
        run: |
          if [ ! -d "./out" ]; then
            echo "ERROR: ./out directory not found after build"
            exit 1
          fi
          FILE_COUNT=$(find ./out -type f | wc -l)
          echo "Build output: $FILE_COUNT files in ./out/"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "ERROR: Suspiciously few files in build output"
            exit 1
          fi
          du -sh ./out/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp)
        env:
          FTP_HOST: vh456.timeweb.ru
          FTP_USER: cm441996
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set mirror:overwrite true;
            open ftp://$FTP_USER:$FTP_PASSWORD@$FTP_HOST;
            echo '=== Step 1: Clean _next/static/ before upload ===';
            rm -r /Masterok/public_html/_next/static/ || true;
            echo '=== Step 2: Upload fresh build ===';
            mirror -R --delete --overwrite --verbose --parallel=4 --no-perms --exclude-glob=kalkulyatory/engineering --exclude-glob=kalkulyatory/engineering/** --exclude-glob=kalkulyatory/interior --exclude-glob=kalkulyatory/interior/** ./out /Masterok/public_html;
            quit
          "

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://getmasterok.ru" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
