name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Timeweb
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.NEXT_PUBLIC_OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://getmasterok.ru
          NEXT_PUBLIC_SITE_NAME: "Мастерок — строительные калькуляторы"
          NEXT_PUBLIC_YM_COUNTER: ${{ vars.NEXT_PUBLIC_YM_COUNTER }}

      - name: Verify build output
        run: |
          if [ ! -d "./out" ]; then
            echo "ERROR: ./out directory not found after build"
            exit 1
          fi
          FILE_COUNT=$(find ./out -type f | wc -l)
          echo "Build output: $FILE_COUNT files in ./out/"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "ERROR: Suspiciously few files in build output"
            exit 1
          fi
          du -sh ./out/

      - name: Deploy via FTP
        run: node deploy-ftp.mjs
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://getmasterok.ru" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
