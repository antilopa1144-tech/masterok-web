<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Редактор блога — Masterok</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #token-gate {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; background: #f5f5f5; padding: 20px;
      }
      #token-gate h1 { font-size: 24px; margin-bottom: 8px; color: #333; }
      #token-gate p { color: #666; margin-bottom: 20px; text-align: center; max-width: 420px; font-size: 14px; line-height: 1.5; }
      #token-gate input {
        width: 100%; max-width: 400px; padding: 12px 16px; border: 2px solid #ddd;
        border-radius: 8px; font-size: 14px; font-family: monospace;
      }
      #token-gate input:focus { outline: none; border-color: #e6437d; }
      #token-gate button {
        margin-top: 12px; padding: 12px 32px; background: #e6437d; color: white;
        border: none; border-radius: 8px; font-size: 16px; cursor: pointer; min-width: 200px;
      }
      #token-gate button:hover { background: #d13570; }
      #token-gate .hint {
        margin-top: 16px; font-size: 12px; color: #999; max-width: 420px; text-align: center; line-height: 1.5;
      }
      #token-gate .hint a { color: #e6437d; }
      #token-gate .error { color: #e53e3e; margin-top: 8px; font-size: 13px; }
      #token-gate .logout-hint { margin-top: 24px; font-size: 11px; color: #bbb; }
    </style>
  </head>
  <body>
    <div id="token-gate">
      <h1>Masterok Blog Editor</h1>
      <p>Для входа нужен GitHub Personal Access Token с правами <b>repo</b>.</p>
      <input type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button onclick="doLogin()">Войти</button>
      <div id="error-msg" class="error"></div>
      <p class="hint">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=Masterok+CMS" target="_blank">Создать токен на GitHub</a>
        (Settings &rarr; Developer settings &rarr; Personal access tokens &rarr; Generate)
      </p>
      <p class="logout-hint">Токен сохраняется в браузере. Для выхода: localStorage.removeItem("masterok-cms-token")</p>
    </div>

    <script>
      var TOKEN_KEY = "masterok-cms-token";

      var savedToken = localStorage.getItem(TOKEN_KEY);
      if (savedToken) {
        document.getElementById("token-gate").innerHTML = "<p>Проверяю токен...</p>";
        verifyAndInit(savedToken);
      }

      function doLogin() {
        var token = document.getElementById("pat-input").value.trim();
        if (!token) {
          document.getElementById("error-msg").textContent = "Введите токен";
          return;
        }
        document.querySelector("#token-gate button").textContent = "Проверяю...";
        verifyAndInit(token);
      }

      document.getElementById("pat-input") &&
        document.getElementById("pat-input").addEventListener("keydown", function(e) {
          if (e.key === "Enter") doLogin();
        });

      function verifyAndInit(token) {
        fetch("https://api.github.com/repos/antilopa1144-tech/masterok-web", {
          headers: { "Authorization": "token " + token }
        })
        .then(function(r) {
          if (!r.ok) throw new Error("Нет доступа");
          return r.json();
        })
        .then(function(repo) {
          localStorage.setItem(TOKEN_KEY, token);
          document.getElementById("token-gate").style.display = "none";
          initCMS(token);
        })
        .catch(function() {
          localStorage.removeItem(TOKEN_KEY);
          location.reload();
        });
      }

      function initCMS(token) {
        // Inject token so Decap CMS picks it up
        localStorage.setItem("netlify-cms-user", JSON.stringify({
          token: token,
          name: "editor",
          login: "editor"
        }));

        var script = document.createElement("script");
        script.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
        document.head.appendChild(script);

        script.onload = function() {
          window.CMS_MANUAL_INIT = true;
          CMS.init({
            config: {
              backend: {
                name: "github",
                repo: "antilopa1144-tech/masterok-web",
                branch: "main"
              },
              load_config_file: false,
              media_folder: "public/blog-images",
              public_folder: "/blog-images",
              locale: "ru",
              collections: [
                {
                  name: "blog",
                  label: "\u0421\u0442\u0430\u0442\u044c\u0438 \u0431\u043b\u043e\u0433\u0430",
                  folder: "content/blog",
                  create: true,
                  slug: "{{slug}}",
                  identifier_field: "slug",
                  summary: "{{title}} ({{date}})",
                  sortable_fields: ["date", "title", "category"],
                  fields: [
                    { label: "Slug (URL)", name: "slug", widget: "string", hint: "\u0422\u043e\u043b\u044c\u043a\u043e \u043b\u0430\u0442\u0438\u043d\u0438\u0446\u0430, \u0446\u0438\u0444\u0440\u044b \u0438 \u0434\u0435\u0444\u0438\u0441\u044b" },
                    { label: "\u0417\u0430\u0433\u043e\u043b\u043e\u0432\u043e\u043a", name: "title", widget: "string" },
                    { label: "\u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435 (meta)", name: "description", widget: "text", hint: "150-160 \u0441\u0438\u043c\u0432\u043e\u043b\u043e\u0432" },
                    { label: "\u0414\u0430\u0442\u0430", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false },
                    { label: "\u0412\u0440\u0435\u043c\u044f \u0447\u0442\u0435\u043d\u0438\u044f", name: "readTime", widget: "string", hint: "7 \u043c\u0438\u043d" },
                    { label: "\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f", name: "category", widget: "select", options: ["\u0421\u0442\u0435\u043d\u044b", "\u041f\u043e\u043b\u044b", "\u0424\u0443\u043d\u0434\u0430\u043c\u0435\u043d\u0442", "\u041a\u0440\u043e\u0432\u043b\u044f", "\u0424\u0430\u0441\u0430\u0434", "\u0418\u043d\u0436\u0435\u043d\u0435\u0440\u043d\u044b\u0435 \u0441\u0438\u0441\u0442\u0435\u043c\u044b", "\u041e\u0442\u0434\u0435\u043b\u043a\u0430"] },
                    { label: "\u0418\u043a\u043e\u043d\u043a\u0430", name: "icon", widget: "string", hint: "\u044d\u043c\u043e\u0434\u0437\u0438" },
                    { label: "\u0422\u0435\u0433\u0438", name: "tags", widget: "list" },
                    { label: "Slug \u043a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440\u0430", name: "relatedCalculatorSlug", widget: "string", required: false },
                    { label: "\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f \u043a\u0430\u043b\u044c\u043a.", name: "relatedCalculatorCategory", widget: "string", required: false },
                    { label: "Hero \u0438\u0437\u043e\u0431\u0440\u0430\u0436\u0435\u043d\u0438\u0435", name: "heroImage", widget: "string" },
                    { label: "Alt hero", name: "heroImageAlt", widget: "string" },
                    { label: "\u0421\u0442\u0430\u0442\u044c\u044f", name: "body", widget: "markdown" }
                  ]
                }
              ]
            }
          });
        };
      }
    </script>
  </body>
</html>
