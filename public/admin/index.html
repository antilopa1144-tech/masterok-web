<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Редактор блога — Masterok</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "antilopa1144-tech/masterok-web",
            branch: "main",
            base_url: "https://script.google.com/macros/s/AKfycbxwv6HhG8xqUEeoP_Y1PcIAa1r7cewQVoKgoKO-m9LrAapTsQkWIsagg9ccw0r4sxrm",
            auth_endpoint: "exec"
          },
          media_folder: "public/blog-images",
          public_folder: "/blog-images",
          locale: "ru",
          collections: [
            {
              name: "blog",
              label: "\u0421\u0442\u0430\u0442\u044c\u0438 \u0431\u043b\u043e\u0433\u0430",
              folder: "content/blog",
              create: true,
              slug: "{{slug}}",
              identifier_field: "slug",
              summary: "{{title}} ({{date}})",
              sortable_fields: ["date", "title", "category"],
              fields: [
                { label: "Slug (URL)", name: "slug", widget: "string", hint: "\u0422\u043e\u043b\u044c\u043a\u043e \u043b\u0430\u0442\u0438\u043d\u0438\u0446\u0430, \u0446\u0438\u0444\u0440\u044b \u0438 \u0434\u0435\u0444\u0438\u0441\u044b" },
                { label: "\u0417\u0430\u0433\u043e\u043b\u043e\u0432\u043e\u043a", name: "title", widget: "string" },
                { label: "\u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435 (meta description)", name: "description", widget: "text", hint: "150-160 \u0441\u0438\u043c\u0432\u043e\u043b\u043e\u0432 \u0434\u043b\u044f SEO" },
                { label: "\u0414\u0430\u0442\u0430 \u043f\u0443\u0431\u043b\u0438\u043a\u0430\u0446\u0438\u0438", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false },
                { label: "\u0412\u0440\u0435\u043c\u044f \u0447\u0442\u0435\u043d\u0438\u044f", name: "readTime", widget: "string", hint: "\u041d\u0430\u043f\u0440\u0438\u043c\u0435\u0440: 7 \u043c\u0438\u043d" },
                { label: "\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f", name: "category", widget: "select", options: ["\u0421\u0442\u0435\u043d\u044b", "\u041f\u043e\u043b\u044b", "\u0424\u0443\u043d\u0434\u0430\u043c\u0435\u043d\u0442", "\u041a\u0440\u043e\u0432\u043b\u044f", "\u0424\u0430\u0441\u0430\u0434", "\u0418\u043d\u0436\u0435\u043d\u0435\u0440\u043d\u044b\u0435 \u0441\u0438\u0441\u0442\u0435\u043c\u044b", "\u041e\u0442\u0434\u0435\u043b\u043a\u0430"] },
                { label: "\u0418\u043a\u043e\u043d\u043a\u0430 (\u044d\u043c\u043e\u0434\u0437\u0438)", name: "icon", widget: "string", hint: "\u041e\u0434\u043d\u0430 \u044d\u043c\u043e\u0434\u0437\u0438" },
                { label: "\u0422\u0435\u0433\u0438", name: "tags", widget: "list", hint: "\u041a\u043b\u044e\u0447\u0435\u0432\u044b\u0435 \u0441\u043b\u043e\u0432\u0430" },
                { label: "Slug \u043a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440\u0430", name: "relatedCalculatorSlug", widget: "string", required: false },
                { label: "\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f \u043a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440\u0430", name: "relatedCalculatorCategory", widget: "string", required: false },
                { label: "Hero \u0438\u0437\u043e\u0431\u0440\u0430\u0436\u0435\u043d\u0438\u0435 (URL)", name: "heroImage", widget: "string" },
                { label: "Alt \u0442\u0435\u043a\u0441\u0442 hero", name: "heroImageAlt", widget: "string" },
                { label: "\u0421\u043e\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435 \u0441\u0442\u0430\u0442\u044c\u0438", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
