<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Редактор блога — Masterok</title>
  <!-- Editor.js + plugins -->
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.30.7/dist/editorjs.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.8/dist/header.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2.0.2/dist/list.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@2.10.1/dist/image.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@2.7.6/dist/quote.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1.4.2/dist/delimiter.umd.min.js"></script>
  <style>
    :root { --accent: #e6437d; --bg: #f5f5f5; --card: #fff; --text: #333; --muted: #888; --border: #e0e0e0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
    .btn { padding: 10px 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { opacity: 0.9; }
    .btn-outline { background: none; color: var(--accent); border: 1px solid var(--accent); }
    .btn-sm { padding: 6px 14px; font-size: 12px; }
    .error { color: #e53e3e; font-size: 13px; margin-top: 8px; }
    .status { padding: 8px 16px; font-size: 13px; border-radius: 6px; margin-bottom: 16px; }
    .status.ok { background: #d4edda; color: #155724; }
    .status.err { background: #f8d7da; color: #721c24; }

    /* Login */
    #login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    #login h1 { font-size: 24px; margin-bottom: 8px; }
    #login p { color: var(--muted); margin-bottom: 20px; text-align: center; max-width: 420px; font-size: 14px; line-height: 1.5; }
    #login input { width: 100%; max-width: 400px; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; font-family: monospace; }
    #login input:focus { outline: none; border-color: var(--accent); }
    #login .btn { margin-top: 12px; font-size: 16px; padding: 12px 32px; }
    #login .hint { margin-top: 16px; font-size: 12px; color: var(--muted); }
    #login .hint a { color: var(--accent); }

    /* Header */
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 18px; }

    /* List */
    #app { display: none; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; }
    .posts { padding: 0 24px 24px; }
    .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .post-card:hover { border-color: var(--accent); }
    .post-card h3 { font-size: 15px; margin-bottom: 4px; }
    .post-card .meta { font-size: 12px; color: var(--muted); }

    /* Editor page */
    #editor { display: none; }
    .editor-wrap { max-width: 820px; margin: 0 auto; padding: 24px 16px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--muted); }
    .field input, .field select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field-row .field { flex: 1; min-width: 150px; }
    .hero-upload { display: flex; gap: 8px; align-items: center; }
    .hero-upload input { flex: 1; }
    .upload-status { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Editor.js container */
    .editorjs-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; min-height: 400px; padding: 8px 0; }
    .editorjs-wrap .ce-block__content { max-width: 100%; padding: 0 20px; }
    .editorjs-wrap .ce-toolbar__content { max-width: 100%; }
    .editorjs-wrap .ce-toolbar__plus { left: -2px; }
    .editorjs-wrap .ce-toolbar__actions { right: -2px; }
    .editorjs-wrap .codex-editor__redactor { padding-bottom: 150px !important; }
    .editorjs-wrap .ce-paragraph { line-height: 1.7; font-size: 15px; }
    .editorjs-wrap h2.ce-header { font-size: 22px; margin: 8px 0 4px; }
    .editorjs-wrap h3.ce-header { font-size: 18px; margin: 8px 0 4px; }

    .editor-actions { display: flex; gap: 8px; margin-top: 20px; padding-bottom: 40px; }

    /* Collapsible meta */
    .meta-toggle { cursor: pointer; font-size: 13px; color: var(--accent); margin-bottom: 12px; user-select: none; }
    .meta-fields { margin-bottom: 16px; }
    .meta-fields.collapsed { display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1>Masterok Blog Editor</h1>
  <p>Для входа нужен GitHub Personal Access Token с правами <b>repo</b>.</p>
  <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
  <button class="btn" id="loginBtn">Войти</button>
  <div id="loginErr" class="error"></div>
  <p class="hint"><a href="https://github.com/settings/tokens/new?scopes=repo&description=Masterok+CMS" target="_blank">Создать токен на GitHub</a></p>
</div>

<!-- POST LIST -->
<div id="app">
  <header>
    <h1>Masterok Blog</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="userName" style="font-size:13px;color:var(--muted)"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Выйти</button>
    </div>
  </header>
  <div class="toolbar">
    <span id="postCount"></span>
    <button class="btn" onclick="newPost()">+ Новая статья</button>
  </div>
  <div class="posts" id="postList"></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <header>
    <h1 id="editorTitle">Редактирование</h1>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="savePost()">Сохранить</button>
      <button class="btn btn-outline" onclick="backToList()">Назад</button>
    </div>
  </header>
  <div class="editor-wrap">
    <div id="editorStatus"></div>

    <!-- Title inline -->
    <div class="field">
      <input id="f-title" placeholder="Заголовок статьи" style="font-size:22px;font-weight:700;border:none;padding:8px 0;border-bottom:2px solid var(--border)" />
    </div>

    <!-- Hero image -->
    <div class="field">
      <label>Главное изображение</label>
      <div class="hero-upload">
        <input id="f-heroImage" placeholder="URL или загрузите файл" />
        <button class="btn btn-outline btn-sm" type="button" onclick="document.getElementById('heroFileInput').click()">Загрузить</button>
        <input type="file" id="heroFileInput" accept="image/*" style="display:none" onchange="uploadHeroImage(this.files[0])" />
      </div>
      <div id="heroUploadStatus" class="upload-status"></div>
      <div id="heroPreview" style="margin-top:8px"></div>
    </div>
    <div class="field"><input id="f-heroAlt" placeholder="Описание изображения (alt)" /></div>

    <!-- Content editor -->
    <div class="field">
      <label>Содержание статьи</label>
      <div class="editorjs-wrap" id="editorjs"></div>
    </div>

    <!-- Collapsible meta fields -->
    <div class="meta-toggle" onclick="toggleMeta()">&#9660; Мета-данные и SEO</div>
    <div class="meta-fields collapsed" id="metaFields">
      <div class="field"><label>Описание (meta description)</label><input id="f-description" placeholder="150-160 символов для SEO" /></div>
      <div class="field-row">
        <div class="field"><label>Slug (URL)</label><input id="f-slug" placeholder="kak-rasschitat-kirpich" /></div>
        <div class="field"><label>Дата</label><input id="f-date" type="date" /></div>
        <div class="field"><label>Время чтения</label><input id="f-readTime" placeholder="7 мин" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Категория</label>
          <select id="f-category">
            <option>Стены</option><option>Полы</option><option>Фундамент</option>
            <option>Кровля</option><option>Фасад</option><option>Инженерные системы</option><option>Отделка</option>
          </select>
        </div>
        <div class="field"><label>Иконка</label><input id="f-icon" placeholder="🧱" /></div>
        <div class="field"><label>Теги (через запятую)</label><input id="f-tags" placeholder="кирпич, кладка, стены" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Slug калькулятора</label><input id="f-calcSlug" /></div>
        <div class="field"><label>Категория калькулятора</label><input id="f-calcCat" /></div>
      </div>
    </div>

    <div class="editor-actions">
      <button class="btn" onclick="savePost()">Сохранить</button>
      <button class="btn btn-outline" onclick="backToList()">Отмена</button>
    </div>
  </div>
</div>

<script>
var REPO = "antilopa1144-tech/masterok-web";
var BRANCH = "main";
var TOKEN_KEY = "masterok-cms-token";
var token = "", currentFile = null, currentSha = null, editorInstance = null;

// ===== Auth =====
var saved = localStorage.getItem(TOKEN_KEY);
if (saved) { document.getElementById("login").innerHTML = '<h1>Загрузка...</h1>'; checkToken(saved); }
document.getElementById("loginBtn").onclick = function() {
  var t = document.getElementById("pat").value.trim();
  if (!t) { document.getElementById("loginErr").textContent = "Введите токен"; return; }
  document.getElementById("loginBtn").textContent = "Проверяю...";
  checkToken(t);
};
document.getElementById("pat").onkeydown = function(e) { if (e.key === "Enter") document.getElementById("loginBtn").click(); };

function checkToken(t) {
  ghAPI("/user", t).then(function(u) {
    token = t; localStorage.setItem(TOKEN_KEY, t);
    document.getElementById("userName").textContent = u.login;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadPosts();
  }).catch(function() { localStorage.removeItem(TOKEN_KEY); location.reload(); });
}
function logout() { localStorage.removeItem(TOKEN_KEY); location.reload(); }

// ===== GitHub API =====
function ghAPI(path, tok, opts) {
  tok = tok || token; opts = opts || {};
  var url = path.startsWith("http") ? path : "https://api.github.com" + path;
  return fetch(url, Object.assign({ headers: { Authorization: "token " + tok, Accept: "application/vnd.github.v3+json" } }, opts))
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.status === 204 ? null : r.json(); });
}

function uploadToGitHub(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() {
      var base64 = reader.result.split(",")[1];
      var name = Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      fetch("https://api.github.com/repos/" + REPO + "/contents/public/blog-images/" + name, {
        method: "PUT",
        headers: { Authorization: "token " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ message: "upload: " + name, content: base64, branch: BRANCH })
      }).then(function(r) {
        if (!r.ok) throw new Error("Upload failed");
        return r.json();
      }).then(function() {
        resolve({ success: 1, file: { url: "/blog-images/" + name } });
      }).catch(reject);
    };
    reader.readAsDataURL(file);
  });
}

// ===== Post List =====
function loadPosts() {
  ghAPI("/repos/" + REPO + "/contents/content/blog?ref=" + BRANCH).then(function(files) {
    var md = files.filter(function(f) { return f.name.endsWith(".md"); });
    md.sort(function(a, b) { return b.name.localeCompare(a.name); });
    document.getElementById("postCount").textContent = md.length + " статей";
    var html = "";
    md.forEach(function(f) {
      var name = f.name.replace(".md", "");
      html += '<div class="post-card" onclick="editPost(\'' + f.path + '\')">' +
        '<div><h3>' + name + '</h3><div class="meta">' + f.path + '</div></div>' +
        '<div class="meta">' + (f.size / 1024).toFixed(1) + ' KB</div></div>';
    });
    document.getElementById("postList").innerHTML = html;
  }).catch(function(e) { document.getElementById("postList").innerHTML = '<p class="error">Ошибка: ' + e.message + '</p>'; });
}

// ===== Editor.js =====
function initEditor(blocks) {
  if (editorInstance) { editorInstance.destroy(); editorInstance = null; }
  editorInstance = new EditorJS({
    holder: "editorjs",
    placeholder: "Начните писать или нажмите + чтобы добавить блок...",
    tools: {
      header: { class: Header, config: { levels: [2, 3, 4], defaultLevel: 2 }, shortcut: "CMD+SHIFT+H" },
      list: { class: List, inlineToolbar: true },
      image: {
        class: ImageTool,
        config: {
          uploader: {
            uploadByFile: function(file) { return uploadToGitHub(file); },
            uploadByUrl: function(url) { return Promise.resolve({ success: 1, file: { url: url } }); }
          }
        }
      },
      quote: { class: Quote, shortcut: "CMD+SHIFT+O" },
      delimiter: Delimiter
    },
    data: blocks ? { blocks: blocks } : undefined,
    i18n: {
      messages: {
        toolNames: { Text: "Текст", Heading: "Заголовок", List: "Список", Image: "Картинка", Quote: "Цитата", Delimiter: "Разделитель" },
        tools: { image: { "Select an Image": "Выберите изображение", "With border": "С рамкой", "Stretch image": "На всю ширину", "With background": "С фоном" } },
        ui: { blockTunes: { toggler: { "Click to tune": "Настройки", "or drag to move": "или перетащите" } } }
      }
    }
  });
}

// ===== Markdown <-> EditorJS =====
function markdownToBlocks(md) {
  var blocks = [], lines = md.split("\n"), i = 0;
  while (i < lines.length) {
    var line = lines[i];
    // Empty line
    if (line.trim() === "") { i++; continue; }
    // Header
    var hm = line.match(/^(#{2,4})\s+(.+)/);
    if (hm) { blocks.push({ type: "header", data: { text: hm[2], level: hm[1].length } }); i++; continue; }
    // Image
    var im = line.match(/^!\[([^\]]*)\]\(([^)]+)\)/);
    if (im) { blocks.push({ type: "image", data: { file: { url: im[2] }, caption: im[1], withBorder: false, stretched: false, withBackground: false } }); i++; continue; }
    // Unordered list
    if (line.match(/^[-*]\s/)) {
      var items = [];
      while (i < lines.length && lines[i].match(/^[-*]\s/)) { items.push(lines[i].replace(/^[-*]\s+/, "")); i++; }
      blocks.push({ type: "list", data: { style: "unordered", items: items } });
      continue;
    }
    // Ordered list
    if (line.match(/^\d+\.\s/)) {
      var items = [];
      while (i < lines.length && lines[i].match(/^\d+\.\s/)) { items.push(lines[i].replace(/^\d+\.\s+/, "")); i++; }
      blocks.push({ type: "list", data: { style: "ordered", items: items } });
      continue;
    }
    // Paragraph (collect consecutive non-empty, non-special lines)
    var para = [];
    while (i < lines.length && lines[i].trim() !== "" && !lines[i].match(/^#{2,4}\s/) && !lines[i].match(/^!\[/) && !lines[i].match(/^[-*]\s/) && !lines[i].match(/^\d+\.\s/)) {
      para.push(lines[i]); i++;
    }
    if (para.length) blocks.push({ type: "paragraph", data: { text: para.join("<br>") } });
  }
  return blocks;
}

function blocksToMarkdown(blocks) {
  var parts = [];
  blocks.forEach(function(b) {
    switch (b.type) {
      case "header": parts.push("#".repeat(b.data.level) + " " + stripHtml(b.data.text)); break;
      case "paragraph": parts.push(stripHtml(b.data.text).replace(/<br\s*\/?>/gi, "\n")); break;
      case "list":
        b.data.items.forEach(function(item, idx) {
          var text = typeof item === "string" ? item : item.content || "";
          parts.push((b.data.style === "ordered" ? (idx + 1) + ". " : "- ") + stripHtml(text));
        });
        break;
      case "image":
        var url = b.data.file ? b.data.file.url : b.data.url || "";
        parts.push("![" + (b.data.caption || "") + "](" + url + ")");
        break;
      case "quote": parts.push("> " + stripHtml(b.data.text)); break;
      case "delimiter": parts.push("---"); break;
      default: if (b.data && b.data.text) parts.push(stripHtml(b.data.text));
    }
  });
  return parts.join("\n\n");
}

function stripHtml(s) {
  if (!s) return "";
  return s.replace(/<b>/gi, "**").replace(/<\/b>/gi, "**")
    .replace(/<i>/gi, "*").replace(/<\/i>/gi, "*")
    .replace(/<a[^>]*href="([^"]*)"[^>]*>/gi, "[$1](").replace(/<\/a>/gi, ")")
    .replace(/<[^>]+>/g, "");
}

// ===== Editor Actions =====
function newPost() {
  currentFile = null; currentSha = null; clearFields();
  document.getElementById("f-date").value = new Date().toISOString().split("T")[0];
  document.getElementById("editorTitle").textContent = "Новая статья";
  showEditor(); initEditor();
}

function editPost(path) {
  document.getElementById("editorTitle").textContent = "Загрузка...";
  showEditor();
  ghAPI("/repos/" + REPO + "/contents/" + path + "?ref=" + BRANCH).then(function(file) {
    currentFile = path; currentSha = file.sha;
    var content = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ""))));
    parseAndFill(content);
    document.getElementById("editorTitle").textContent = "Редактирование";
  });
}

function parseAndFill(raw) {
  var parts = raw.split("---");
  if (parts.length < 3) { initEditor(markdownToBlocks(raw)); return; }
  var fm = parts[1], body = parts.slice(2).join("---").trim();
  setField("slug", extractFM(fm, "slug"));
  setField("title", extractFM(fm, "title"));
  setField("description", extractFM(fm, "description"));
  setField("date", extractFM(fm, "date"));
  setField("readTime", extractFM(fm, "readTime"));
  setField("category", extractFM(fm, "category"));
  setField("icon", extractFM(fm, "icon"));
  setField("heroImage", extractFM(fm, "heroImage"));
  setField("heroAlt", extractFM(fm, "heroImageAlt"));
  setField("calcSlug", extractFM(fm, "relatedCalculatorSlug"));
  setField("calcCat", extractFM(fm, "relatedCalculatorCategory"));
  var tags = extractFM(fm, "tags");
  if (tags.startsWith("[")) tags = tags.replace(/[\[\]"]/g, "");
  setField("tags", tags);
  updateHeroPreview();
  initEditor(markdownToBlocks(body));
}

function extractFM(text, key) {
  var re = new RegExp('^' + key + ':\\s*"?(.*?)"?\\s*$', 'm');
  var m = text.match(re); return m ? m[1] : "";
}

function setField(id, val) { var el = document.getElementById("f-" + id); if (el) el.value = val || ""; }
function getField(id) { var el = document.getElementById("f-" + id); return el ? el.value.trim() : ""; }

function clearFields() {
  ["slug","title","description","date","readTime","category","icon","tags","calcSlug","calcCat","heroImage","heroAlt"].forEach(function(id) { setField(id, ""); });
  document.getElementById("editorStatus").innerHTML = "";
  document.getElementById("heroPreview").innerHTML = "";
}

function savePost() {
  if (!editorInstance) return;
  var slug = getField("slug"), title = getField("title");
  if (!slug || !title) { showStatus("Заполните заголовок и slug", true); return; }

  editorInstance.save().then(function(outputData) {
    var body = blocksToMarkdown(outputData.blocks);
    var tags = getField("tags").split(",").map(function(t) { return '"' + t.trim() + '"'; }).filter(function(t) { return t !== '""'; });
    var fm = '---\nslug: "' + slug + '"\ntitle: "' + title + '"\n';
    fm += 'description: "' + getField("description") + '"\n';
    fm += 'date: "' + getField("date") + '"\nreadTime: "' + getField("readTime") + '"\n';
    fm += 'category: "' + getField("category") + '"\nicon: "' + getField("icon") + '"\n';
    fm += 'tags: [' + tags.join(", ") + ']\n';
    if (getField("calcSlug")) fm += 'relatedCalculatorSlug: "' + getField("calcSlug") + '"\n';
    if (getField("calcCat")) fm += 'relatedCalculatorCategory: "' + getField("calcCat") + '"\n';
    fm += 'heroImage: "' + getField("heroImage") + '"\nheroImageAlt: "' + getField("heroAlt") + '"\n---\n\n';
    var content = fm + body + '\n';
    var encoded = btoa(unescape(encodeURIComponent(content)));
    var path = currentFile || "content/blog/" + slug + ".md";
    var reqBody = { message: (currentFile ? "update" : "create") + ": " + slug, content: encoded, branch: BRANCH };
    if (currentSha) reqBody.sha = currentSha;

    showStatus("Сохраняю...", false);
    fetch("https://api.github.com/repos/" + REPO + "/contents/" + path, {
      method: "PUT", headers: { Authorization: "token " + token, "Content-Type": "application/json" },
      body: JSON.stringify(reqBody)
    }).then(function(r) { if (!r.ok) return r.json().then(function(e) { throw new Error(e.message); }); return r.json(); })
      .then(function(data) { currentSha = data.content.sha; currentFile = path; showStatus("Сохранено! Автодеплой запущен.", false); })
      .catch(function(e) { showStatus("Ошибка: " + e.message, true); });
  });
}

function showStatus(msg, isErr) { document.getElementById("editorStatus").innerHTML = '<div class="status ' + (isErr ? "err" : "ok") + '">' + msg + '</div>'; }
function showEditor() { document.getElementById("app").style.display = "none"; document.getElementById("editor").style.display = "block"; }
function backToList() {
  document.getElementById("editor").style.display = "none"; document.getElementById("app").style.display = "block";
  if (editorInstance) { editorInstance.destroy(); editorInstance = null; }
  loadPosts();
}
function toggleMeta() {
  var el = document.getElementById("metaFields");
  el.classList.toggle("collapsed");
  document.querySelector(".meta-toggle").innerHTML = (el.classList.contains("collapsed") ? "&#9660;" : "&#9650;") + " Мета-данные и SEO";
}

// ===== Hero Image =====
function uploadHeroImage(file) {
  if (!file) return;
  document.getElementById("heroUploadStatus").textContent = "Загрузка...";
  uploadToGitHub(file).then(function(res) {
    document.getElementById("f-heroImage").value = res.file.url;
    document.getElementById("heroUploadStatus").textContent = "Загружено!";
    updateHeroPreview();
    setTimeout(function() { document.getElementById("heroUploadStatus").textContent = ""; }, 3000);
  }).catch(function(e) { document.getElementById("heroUploadStatus").textContent = "Ошибка: " + e; });
}
function updateHeroPreview() {
  var url = getField("heroImage");
  document.getElementById("heroPreview").innerHTML = url ? '<img src="' + url + '" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:cover" />' : "";
}
document.addEventListener("change", function(e) { if (e.target.id === "f-heroImage") updateHeroPreview(); });
</script>
</body>
</html>
