<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Редактор блога — Masterok</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #gate {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; background: #f5f5f5; padding: 20px;
      }
      #gate h1 { font-size: 24px; margin-bottom: 8px; color: #333; }
      #gate p { color: #666; margin-bottom: 20px; text-align: center; max-width: 420px; font-size: 14px; line-height: 1.5; }
      #gate input {
        width: 100%; max-width: 400px; padding: 12px 16px; border: 2px solid #ddd;
        border-radius: 8px; font-size: 14px; font-family: monospace;
      }
      #gate input:focus { outline: none; border-color: #e6437d; }
      #gate button {
        margin-top: 12px; padding: 12px 32px; background: #e6437d; color: white;
        border: none; border-radius: 8px; font-size: 16px; cursor: pointer; min-width: 200px;
      }
      #gate button:hover { background: #d13570; }
      #gate .hint { margin-top: 16px; font-size: 12px; color: #999; max-width: 420px; text-align: center; line-height: 1.5; }
      #gate .hint a { color: #e6437d; }
      #gate .error { color: #e53e3e; margin-top: 8px; font-size: 13px; }
    </style>
  </head>
  <body>
    <div id="gate">
      <h1>Masterok Blog Editor</h1>
      <p>Для входа нужен GitHub Personal Access Token с правами <b>repo</b>.</p>
      <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button id="btn">Войти</button>
      <div id="err" class="error"></div>
      <p class="hint">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=Masterok+CMS" target="_blank" rel="noopener">Создать токен на GitHub</a>
      </p>
      <p class="hint">Для выхода: F12 → Console → localStorage.clear() → Enter → обновить страницу</p>
    </div>

    <script>
      (function() {
        var TOKEN_KEY = "masterok-cms-token";
        var CMS_KEY = "netlify-cms-user";

        // If token already saved — verify and boot CMS immediately
        var saved = localStorage.getItem(TOKEN_KEY);
        if (saved) {
          document.getElementById("gate").innerHTML = '<h1>Masterok Blog Editor</h1><p>Загрузка редактора...</p>';
          verify(saved, function(user) {
            storeAndBoot(saved, user);
          }, function() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(CMS_KEY);
            location.reload();
          });
          return;
        }

        // Login button
        document.getElementById("btn").onclick = function() {
          var token = document.getElementById("pat").value.trim();
          if (!token) { showErr("Введите токен"); return; }
          document.getElementById("btn").textContent = "Проверяю...";
          document.getElementById("btn").disabled = true;
          verify(token, function(user) {
            storeAndBoot(token, user);
          }, function() {
            showErr("Неверный токен или нет доступа к репозиторию");
            document.getElementById("btn").textContent = "Войти";
            document.getElementById("btn").disabled = false;
          });
        };

        document.getElementById("pat").onkeydown = function(e) {
          if (e.key === "Enter") document.getElementById("btn").click();
        };

        function showErr(msg) { var el = document.getElementById("err"); el.textContent = msg; }

        function verify(token, onOk, onFail) {
          fetch("https://api.github.com/user", { headers: { Authorization: "token " + token } })
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function(u) { onOk(u); })
            .catch(onFail);
        }

        function storeAndBoot(token, user) {
          // Save our token
          localStorage.setItem(TOKEN_KEY, token);
          // Save in exact format Decap CMS reads on restore
          localStorage.setItem(CMS_KEY, JSON.stringify({
            token: token,
            name: user.name || user.login,
            login: user.login,
            avatar_url: user.avatar_url || ""
          }));

          // Hide gate
          document.getElementById("gate").style.display = "none";

          // Load Decap CMS — let it auto-initialize from config.yml
          // It will call restoreUser(), find our token, validate, show dashboard
          var s = document.createElement("script");
          s.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
          document.body.appendChild(s);
        }
      })();
    </script>
  </body>
</html>
