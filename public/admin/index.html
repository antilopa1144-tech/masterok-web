<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Редактор блога — Masterok</title>
  <style>
    :root { --accent: #e6437d; --bg: #f5f5f5; --card: #fff; --text: #333; --muted: #888; --border: #e0e0e0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
    .btn { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .btn-o { background: none; color: var(--accent); border: 1px solid var(--accent); }
    .btn-s { padding: 5px 12px; font-size: 12px; }
    .err { color: #e53e3e; font-size: 13px; margin-top: 8px; }
    .ok { padding: 8px 16px; font-size: 13px; border-radius: 6px; margin-bottom: 12px; background: #d4edda; color: #155724; }
    .bad { padding: 8px 16px; font-size: 13px; border-radius: 6px; margin-bottom: 12px; background: #f8d7da; color: #721c24; }

    /* Login */
    #login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    #login h1 { font-size: 24px; margin-bottom: 8px; }
    #login p { color: var(--muted); margin-bottom: 16px; text-align: center; max-width: 420px; font-size: 14px; line-height: 1.5; }
    #login input { width: 100%; max-width: 400px; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; font-family: monospace; }
    #login .btn { margin-top: 12px; font-size: 16px; padding: 12px 32px; }
    #login a { color: var(--accent); font-size: 12px; margin-top: 12px; }

    /* Header */
    header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 16px; }

    /* List */
    #app { display: none; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; }
    .posts { padding: 0 20px 20px; }
    .pc { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .pc:hover { border-color: var(--accent); }
    .pc h3 { font-size: 14px; margin-bottom: 2px; }
    .pc .m { font-size: 11px; color: var(--muted); }

    /* Editor */
    #ed { display: none; }
    .ew { max-width: 860px; margin: 0 auto; padding: 20px 16px; }
    .f { margin-bottom: 14px; }
    .f label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 3px; color: var(--muted); }
    .f input, .f select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .f input:focus, .f select:focus { outline: none; border-color: var(--accent); }
    .fr { display: flex; gap: 10px; flex-wrap: wrap; }
    .fr .f { flex: 1; min-width: 140px; }

    /* Hero */
    .hu { display: flex; gap: 8px; align-items: center; }
    .hu input { flex: 1; }
    #hp { margin-top: 6px; }
    #hp img { max-width: 100%; max-height: 180px; border-radius: 8px; object-fit: cover; }

    /* Markdown editor */
    .md-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--card); }
    .md-tb { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px 8px; background: #f0f0f0; border-bottom: 1px solid var(--border); align-items: center; }
    .md-tb button { padding: 4px 10px; font-size: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: inherit; }
    .md-tb button:hover { background: #e8e8e8; }
    .md-tb .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .md-tb .upload-s { font-size: 11px; color: var(--muted); margin-left: 8px; }
    #body { width: 100%; min-height: 450px; padding: 14px; border: none; font-size: 14px; line-height: 1.7; resize: vertical; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    #body:focus { outline: none; }

    /* Drop zone */
    .dz { display: none; padding: 40px; text-align: center; color: var(--muted); font-size: 14px; border: 2px dashed var(--border); margin: 8px; border-radius: 8px; }
    .dz.on { display: block; }
    .dz.hover { border-color: var(--accent); background: #fef2f6; }

    /* Meta toggle */
    .mt { cursor: pointer; font-size: 13px; color: var(--accent); margin: 8px 0 12px; user-select: none; }
    .mf { margin-bottom: 14px; }
    .mf.hide { display: none; }

    .ea { display: flex; gap: 8px; margin-top: 16px; padding-bottom: 40px; }
  </style>
</head>
<body>

<div id="login">
  <h1>Masterok Blog Editor</h1>
  <p>Для входа нужен GitHub Personal Access Token с правами <b>repo</b>.</p>
  <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
  <button class="btn" id="lb">Войти</button>
  <div id="le" class="err"></div>
  <a href="https://github.com/settings/tokens/new?scopes=repo&description=Masterok+CMS" target="_blank">Создать токен на GitHub</a>
</div>

<div id="app">
  <header><h1>Masterok Blog</h1><div style="display:flex;gap:10px;align-items:center"><span id="un" style="font-size:12px;color:var(--muted)"></span><button class="btn btn-o btn-s" onclick="logout()">Выйти</button></div></header>
  <div class="toolbar"><span id="pc"></span><button class="btn" onclick="np()">+ Новая статья</button></div>
  <div class="posts" id="pl"></div>
</div>

<div id="ed">
  <header>
    <h1 id="et">Редактирование</h1>
    <div style="display:flex;gap:6px"><button class="btn" onclick="save()">Сохранить</button><button class="btn btn-o" onclick="back()">Назад</button></div>
  </header>
  <div class="ew">
    <div id="st"></div>
    <div class="f"><input id="f-title" placeholder="Заголовок статьи" style="font-size:20px;font-weight:700;border:none;padding:8px 0;border-bottom:2px solid var(--border)" /></div>

    <div class="f">
      <label>Главное изображение</label>
      <div class="hu">
        <input id="f-hero" placeholder="URL картинки" oninput="hp()" />
        <button class="btn btn-o btn-s" onclick="$('hf').click()">Загрузить</button>
        <input type="file" id="hf" accept="image/*" style="display:none" onchange="uh(this.files[0])" />
      </div>
      <span id="hs" style="font-size:11px;color:var(--muted)"></span>
      <div id="hp"></div>
    </div>
    <div class="f"><input id="f-halt" placeholder="Описание изображения (alt)" /></div>

    <div class="f">
      <label>Содержание статьи</label>
      <div class="md-wrap">
        <div class="md-tb">
          <button onclick="ins('## ','',1)" title="Заголовок H2"><b>H2</b></button>
          <button onclick="ins('### ','',1)" title="Заголовок H3"><b>H3</b></button>
          <span class="sep"></span>
          <button onclick="wrap('**')" title="Жирный"><b>Ж</b></button>
          <button onclick="wrap('*')" title="Курсив"><i>К</i></button>
          <span class="sep"></span>
          <button onclick="ins('- ','',1)" title="Список">Список</button>
          <button onclick="ins('1. ','',1)" title="Нумерованный">1. 2. 3.</button>
          <span class="sep"></span>
          <button onclick="$('bf').click()" title="Загрузить картинку">📷 Картинка</button>
          <button onclick="iurl()" title="Картинка по URL">🔗 По URL</button>
          <button onclick="tdz()" title="Drag & drop">📁 Перетащить</button>
          <span id="bs" class="upload-s"></span>
          <input type="file" id="bf" accept="image/*" style="display:none" onchange="ub(this.files[0])" />
        </div>
        <div class="dz" id="dz" ondragover="dzo(event)" ondragleave="dzl(event)" ondrop="dzd(event)">Перетащите картинку сюда</div>
        <textarea id="body" placeholder="Начните писать статью...&#10;&#10;## Заголовок&#10;&#10;Текст абзаца.&#10;&#10;- Пункт списка&#10;&#10;![Описание](URL картинки)"></textarea>
      </div>
    </div>

    <div class="mt" onclick="tm()">&#9660; Мета-данные и SEO</div>
    <div class="mf hide" id="mf">
      <div class="f"><label>Описание (meta)</label><input id="f-desc" placeholder="150-160 символов для SEO" /></div>
      <div class="fr">
        <div class="f"><label>Slug (URL)</label><input id="f-slug" placeholder="kak-rasschitat-kirpich" /></div>
        <div class="f"><label>Дата</label><input id="f-date" type="date" /></div>
        <div class="f"><label>Время чтения</label><input id="f-rt" placeholder="7 мин" /></div>
      </div>
      <div class="fr">
        <div class="f"><label>Категория</label><select id="f-cat"><option>Стены</option><option>Полы</option><option>Фундамент</option><option>Кровля</option><option>Фасад</option><option>Инженерные системы</option><option>Отделка</option></select></div>
        <div class="f"><label>Иконка</label><input id="f-icon" placeholder="🧱" /></div>
        <div class="f"><label>Теги (через запятую)</label><input id="f-tags" placeholder="кирпич, кладка" /></div>
      </div>
      <div class="fr">
        <div class="f"><label>Slug калькулятора</label><input id="f-cs" /></div>
        <div class="f"><label>Категория калькулятора</label><input id="f-cc" /></div>
      </div>
    </div>

    <div class="ea">
      <button class="btn" onclick="save()">Сохранить</button>
      <button class="btn btn-o" onclick="back()">Отмена</button>
    </div>
  </div>
</div>

<script>
var R="antilopa1144-tech/masterok-web",B="main",TK="masterok-cms-token",tk="",cf=null,cs=null;
function $(id){return document.getElementById(id)}

// Auth
var sv=localStorage.getItem(TK);
if(sv){$("login").innerHTML='<h1>Загрузка...</h1>';ck(sv)}
$("lb").onclick=function(){var t=$("pat").value.trim();if(!t){$("le").textContent="Введите токен";return}$("lb").textContent="Проверяю...";ck(t)};
$("pat").onkeydown=function(e){if(e.key==="Enter")$("lb").click()};
function ck(t){api("/user",t).then(function(u){tk=t;localStorage.setItem(TK,t);$("un").textContent=u.login;$("login").style.display="none";$("app").style.display="block";lp()}).catch(function(){localStorage.removeItem(TK);location.reload()})}
function logout(){localStorage.removeItem(TK);location.reload()}

// API
function api(p,t,o){t=t||tk;o=o||{};var u=p.startsWith("http")?p:"https://api.github.com"+p;return fetch(u,Object.assign({headers:{Authorization:"token "+t,Accept:"application/vnd.github.v3+json"}},o)).then(function(r){if(!r.ok)throw new Error(r.status);return r.status===204?null:r.json()})}

function upload(file){
  return new Promise(function(ok,no){
    var rd=new FileReader();
    rd.onload=function(){
      var b64=rd.result.split(",")[1];
      var nm=Date.now()+"-"+file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      fetch("https://api.github.com/repos/"+R+"/contents/public/blog-images/"+nm,{
        method:"PUT",headers:{Authorization:"token "+tk,"Content-Type":"application/json"},
        body:JSON.stringify({message:"upload: "+nm,content:b64,branch:B})
      }).then(function(r){if(!r.ok)throw new Error("fail");return r.json()})
      .then(function(d){
        // Get raw URL using GitHub API for private repos
        ok({path:"/blog-images/"+nm, previewUrl:"https://api.github.com/repos/"+R+"/contents/public/blog-images/"+nm+"?ref="+B});
      }).catch(no);
    };
    rd.readAsDataURL(file);
  });
}

// Preview image via GitHub API (works for private repos)
function previewImg(path, imgEl){
  if(path.startsWith("http")){imgEl.src=path;imgEl.style.display="block";return}
  // For relative paths, use GitHub API to get download_url
  api("/repos/"+R+"/contents/public"+path+"?ref="+B).then(function(d){
    if(d.download_url){imgEl.src=d.download_url;imgEl.style.display="block"}
  }).catch(function(){imgEl.style.display="none"});
}

// Posts
function lp(){
  api("/repos/"+R+"/contents/content/blog?ref="+B).then(function(fs){
    var md=fs.filter(function(f){return f.name.endsWith(".md")});
    md.sort(function(a,b){return a.name.localeCompare(b.name)});
    $("pc").textContent=md.length+" статей";
    var h="";
    md.forEach(function(f){
      var n=f.name.replace(".md","");
      h+='<div class="pc" onclick="ep(\''+f.path+'\')"><div><h3>'+n+'</h3><div class="m">'+f.path+'</div></div><div class="m">'+(f.size/1024).toFixed(1)+' KB</div></div>';
    });
    $("pl").innerHTML=h;
  }).catch(function(e){$("pl").innerHTML='<p class="err">Ошибка: '+e.message+'</p>'});
}

// Editor
function np(){cf=null;cs=null;clr();$("f-date").value=new Date().toISOString().split("T")[0];$("et").textContent="Новая статья";se()}
function ep(p){$("et").textContent="Загрузка...";se();api("/repos/"+R+"/contents/"+p+"?ref="+B).then(function(f){cf=p;cs=f.sha;var c=decodeURIComponent(escape(atob(f.content.replace(/\n/g,""))));pf(c);$("et").textContent="Редактирование"})}

function pf(raw){
  var ps=raw.split("---");if(ps.length<3){$("body").value=raw;return}
  var fm=ps[1],bd=ps.slice(2).join("---").trim();
  $("body").value=bd;
  sf("title",ex(fm,"title"));sf("desc",ex(fm,"description"));sf("slug",ex(fm,"slug"));
  sf("date",ex(fm,"date"));sf("rt",ex(fm,"readTime"));sf("cat",ex(fm,"category"));
  sf("icon",ex(fm,"icon"));sf("hero",ex(fm,"heroImage"));sf("halt",ex(fm,"heroImageAlt"));
  sf("cs",ex(fm,"relatedCalculatorSlug"));sf("cc",ex(fm,"relatedCalculatorCategory"));
  var tg=ex(fm,"tags");if(tg.startsWith("["))tg=tg.replace(/[\[\]"]/g,"");sf("tags",tg);
  hp();
}

function ex(t,k){var r=new RegExp('^'+k+':\\s*"?(.*?)"?\\s*$','m');var m=t.match(r);return m?m[1]:""}
function sf(id,v){var e=$("f-"+id);if(e)e.value=v||""}
function gf(id){var e=$("f-"+id);return e?e.value.trim():""}
function clr(){["title","desc","slug","date","rt","cat","icon","tags","cs","cc","hero","halt"].forEach(function(id){sf(id,"")});$("body").value="";$("st").innerHTML="";$("hp").innerHTML=""}

function save(){
  var slug=gf("slug"),title=gf("title");
  if(!slug||!title){ss("Заполните заголовок и slug",1);return}
  var tg=gf("tags").split(",").map(function(t){return'"'+t.trim()+'"'}).filter(function(t){return t!=='""'});
  var fm='---\nslug: "'+slug+'"\ntitle: "'+title+'"\n';
  fm+='description: "'+gf("desc")+'"\ndate: "'+gf("date")+'"\nreadTime: "'+gf("rt")+'"\n';
  fm+='category: "'+gf("cat")+'"\nicon: "'+gf("icon")+'"\ntags: ['+tg.join(", ")+']\n';
  if(gf("cs"))fm+='relatedCalculatorSlug: "'+gf("cs")+'"\n';
  if(gf("cc"))fm+='relatedCalculatorCategory: "'+gf("cc")+'"\n';
  fm+='heroImage: "'+gf("hero")+'"\nheroImageAlt: "'+gf("halt")+'"\n---\n\n';
  var ct=fm+$("body").value+'\n';
  var enc=btoa(unescape(encodeURIComponent(ct)));
  var pa=cf||"content/blog/"+slug+".md";
  var bd={message:(cf?"update":"create")+": "+slug,content:enc,branch:B};
  if(cs)bd.sha=cs;
  ss("Сохраняю...",0);
  fetch("https://api.github.com/repos/"+R+"/contents/"+pa,{method:"PUT",headers:{Authorization:"token "+tk,"Content-Type":"application/json"},body:JSON.stringify(bd)})
  .then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.message)});return r.json()})
  .then(function(d){cs=d.content.sha;cf=pa;ss("Сохранено! Автодеплой запущен.",0)})
  .catch(function(e){ss("Ошибка: "+e.message,1)});
}

function ss(m,e){$("st").innerHTML='<div class="'+(e?"bad":"ok")+'">'+m+'</div>'}
function se(){$("app").style.display="none";$("ed").style.display="block";$("body").focus()}
function back(){$("ed").style.display="none";$("app").style.display="block";lp()}
function tm(){var e=$("mf");e.classList.toggle("hide");document.querySelector(".mt").innerHTML=(e.classList.contains("hide")?"&#9660;":"&#9650;")+" Мета-данные и SEO"}

// Hero image
function uh(file){
  if(!file)return;$("hs").textContent="Загрузка...";
  upload(file).then(function(r){sf("hero",r.path);$("hs").textContent="Загружено!";hp();setTimeout(function(){$("hs").textContent=""},3000)}).catch(function(e){$("hs").textContent="Ошибка"});
}
function hp(){
  var url=gf("hero");
  if(!url){$("hp").innerHTML="";return}
  var img=document.createElement("img");
  img.style.cssText="max-width:100%;max-height:180px;border-radius:8px;object-fit:cover;display:none";
  $("hp").innerHTML="";$("hp").appendChild(img);
  if(url.startsWith("http")){img.src=url;img.style.display="block";img.onerror=function(){img.style.display="none"}}
  else{previewImg(url,img)}
}

// Markdown toolbar
function ins(before,after,nl){
  var ta=$("body"),s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;
  var sel=v.substring(s,e)||"";
  var pre=v.substring(0,s),post=v.substring(e);
  if(nl&&s>0&&!pre.endsWith("\n"))before="\n"+before;
  var t=before+sel+(after||"");
  ta.value=pre+t+post;
  ta.selectionStart=s+before.length;ta.selectionEnd=s+before.length+sel.length;
  ta.focus();
}
function wrap(ch){
  var ta=$("body"),s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;
  var sel=v.substring(s,e);
  if(!sel){ta.value=v.substring(0,s)+ch+"текст"+ch+v.substring(e);ta.selectionStart=s+ch.length;ta.selectionEnd=s+ch.length+5}
  else{ta.value=v.substring(0,s)+ch+sel+ch+v.substring(e);ta.selectionStart=s+ch.length;ta.selectionEnd=e+ch.length}
  ta.focus();
}

// Body image upload
function ub(file){
  if(!file)return;$("bs").textContent="Загрузка "+file.name+"...";
  upload(file).then(function(r){
    ins("\n!["+file.name.replace(/\.[^.]+$/,"")+"]("+r.path+")\n","",0);
    $("bs").textContent="Загружено!";setTimeout(function(){$("bs").textContent=""},3000);
  }).catch(function(e){$("bs").textContent="Ошибка"});
}
function iurl(){
  var url=prompt("URL картинки:");if(!url)return;
  var alt=prompt("Описание (alt):","картинка")||"картинка";
  ins("\n!["+alt+"]("+url+")\n","",0);
}

// Drag & drop
function tdz(){$("dz").classList.toggle("on")}
function dzo(e){e.preventDefault();e.currentTarget.classList.add("hover")}
function dzl(e){e.currentTarget.classList.remove("hover")}
function dzd(e){e.preventDefault();e.currentTarget.classList.remove("hover");var f=e.dataTransfer.files[0];if(f)ub(f);$("dz").classList.remove("on")}

// Also support drag&drop directly on textarea
$("body") && $("body").addEventListener("dragover",function(e){e.preventDefault()});
$("body") && $("body").addEventListener("drop",function(e){
  e.preventDefault();var f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith("image/"))ub(f);
});
</script>
</body>
</html>
