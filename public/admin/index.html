<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Редактор блога — Masterok</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #gate {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; background: #f5f5f5; padding: 20px;
      }
      #gate h1 { font-size: 24px; margin-bottom: 8px; color: #333; }
      #gate p { color: #666; margin-bottom: 20px; text-align: center; max-width: 420px; font-size: 14px; line-height: 1.5; }
      #gate input {
        width: 100%; max-width: 400px; padding: 12px 16px; border: 2px solid #ddd;
        border-radius: 8px; font-size: 14px; font-family: monospace;
      }
      #gate input:focus { outline: none; border-color: #e6437d; }
      #gate button {
        margin-top: 12px; padding: 12px 32px; background: #e6437d; color: white;
        border: none; border-radius: 8px; font-size: 16px; cursor: pointer; min-width: 200px;
      }
      #gate button:hover { background: #d13570; }
      #gate .hint { margin-top: 16px; font-size: 12px; color: #999; max-width: 420px; text-align: center; line-height: 1.5; }
      #gate .hint a { color: #e6437d; }
      #gate .error { color: #e53e3e; margin-top: 8px; font-size: 13px; }
    </style>
    <script>window.CMS_MANUAL_INIT = true;</script>
  </head>
  <body>
    <div id="gate">
      <h1>Masterok Blog Editor</h1>
      <p>Для входа нужен GitHub Personal Access Token с правами <b>repo</b>.</p>
      <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button id="btn" onclick="doLogin()">Войти</button>
      <div id="err" class="error"></div>
      <p class="hint">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=Masterok+CMS" target="_blank" rel="noopener">Создать токен на GitHub</a>
      </p>
    </div>

    <script>
      var TOKEN_KEY = "masterok-cms-token";
      var CMS_USER_KEY = "netlify-cms-user";
      var REPO = "antilopa1144-tech/masterok-web";

      // Auto-login if token exists
      var saved = localStorage.getItem(TOKEN_KEY);
      if (saved) {
        showMsg("Проверяю токен...");
        checkAndBoot(saved);
      }

      function showMsg(text) {
        document.getElementById("gate").innerHTML = '<h1>Masterok Blog Editor</h1><p>' + text + '</p>';
      }

      function doLogin() {
        var t = document.getElementById("pat").value.trim();
        if (!t) { document.getElementById("err").textContent = "Введите токен"; return; }
        document.getElementById("btn").textContent = "Проверяю...";
        document.getElementById("btn").disabled = true;
        checkAndBoot(t);
      }

      function checkAndBoot(token) {
        fetch("https://api.github.com/user", { headers: { Authorization: "token " + token } })
          .then(function(r) { if (!r.ok) throw new Error("bad"); return r.json(); })
          .then(function(user) {
            // Save token
            localStorage.setItem(TOKEN_KEY, token);
            // Save in format Decap CMS expects
            localStorage.setItem(CMS_USER_KEY, JSON.stringify({
              token: token,
              name: user.name || user.login,
              login: user.login,
              avatar_url: user.avatar_url || "",
              backendName: "github"
            }));
            document.getElementById("gate").style.display = "none";
            loadDecap();
          })
          .catch(function() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(CMS_USER_KEY);
            location.reload();
          });
      }

      function loadDecap() {
        var s = document.createElement("script");
        s.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
        s.onload = function() {
          initCMS();
        };
        document.body.appendChild(s);
      }

      function initCMS() {
        CMS.init({
          config: {
            load_config_file: false,
            backend: { name: "github", repo: REPO, branch: "main" },
            media_folder: "public/blog-images",
            public_folder: "/blog-images",
            locale: "ru",
            collections: [{
              name: "blog", label: "Статьи блога", folder: "content/blog",
              create: true, slug: "{{slug}}", identifier_field: "slug",
              summary: "{{title}} ({{date}})",
              sortable_fields: ["date", "title", "category"],
              fields: [
                { label: "Slug (URL)", name: "slug", widget: "string" },
                { label: "Заголовок", name: "title", widget: "string" },
                { label: "Описание", name: "description", widget: "text" },
                { label: "Дата", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false },
                { label: "Время чтения", name: "readTime", widget: "string" },
                { label: "Категория", name: "category", widget: "select", options: ["Стены","Полы","Фундамент","Кровля","Фасад","Инженерные системы","Отделка"] },
                { label: "Иконка", name: "icon", widget: "string" },
                { label: "Теги", name: "tags", widget: "list" },
                { label: "Slug калькулятора", name: "relatedCalculatorSlug", widget: "string", required: false },
                { label: "Категория калькулятора", name: "relatedCalculatorCategory", widget: "string", required: false },
                { label: "Hero изображение", name: "heroImage", widget: "string" },
                { label: "Hero alt", name: "heroImageAlt", widget: "string" },
                { label: "Статья", name: "body", widget: "markdown" }
              ]
            }]
          }
        });
      }
    </script>
  </body>
</html>
