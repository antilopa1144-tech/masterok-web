backend:
  name: github
  repo: antilopa1144-tech/masterok-web
  branch: main
  auth_type: pkce

# Загрузка медиафайлов
media_folder: "public/blog-images"
public_folder: "/blog-images"

# Локаль
locale: "ru"

collections:
  - name: "blog"
    label: "Статьи блога"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    summary: "{{title}} ({{date}})"
    sortable_fields: ["date", "title", "category"]
    fields:
      - label: "Slug (URL)"
        name: "slug"
        widget: "string"
        hint: "Только латиница, цифры и дефисы. Например: kak-rasschitat-kirpich"

      - label: "Заголовок"
        name: "title"
        widget: "string"

      - label: "Описание (meta description)"
        name: "description"
        widget: "text"
        hint: "150-160 символов для SEO"

      - label: "Дата публикации"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false

      - label: "Время чтения"
        name: "readTime"
        widget: "string"
        hint: "Например: 7 мин"

      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - "Стены"
          - "Полы"
          - "Фундамент"
          - "Кровля"
          - "Фасад"
          - "Инженерные системы"
          - "Отделка"

      - label: "Иконка (эмодзи)"
        name: "icon"
        widget: "string"
        hint: "Одна эмодзи, например 🧱"

      - label: "Теги"
        name: "tags"
        widget: "list"
        hint: "Ключевые слова через запятую"

      - label: "Slug связанного калькулятора"
        name: "relatedCalculatorSlug"
        widget: "string"
        required: false
        hint: "Например: kirpich"

      - label: "Категория связанного калькулятора"
        name: "relatedCalculatorCategory"
        widget: "string"
        required: false
        hint: "Например: steny"

      - label: "Hero изображение (URL)"
        name: "heroImage"
        widget: "string"
        hint: "URL изображения. Или загрузите в Медиа."

      - label: "Alt текст для hero изображения"
        name: "heroImageAlt"
        widget: "string"

      - label: "Содержание статьи"
        name: "body"
        widget: "markdown"
        hint: "Поддерживает заголовки ##, списки, изображения, жирный/курсив"
